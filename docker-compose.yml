services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MOCK_MODE=false
      - REDIS_URL=redis://redis:6379/0
      - PUBMED_EMAIL=csiddhant12@gmail.com
      - LLM_BACKEND=extractive
      - SLACK_WEBHOOK_URL=
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
